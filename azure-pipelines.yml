trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  subscriptionId: "<your-subscription-id>"
  resourceGroup: "<your-resource-group>"
  assignee: "<userPrincipalName-or-objectId>"
  roleName: "Contributor"

stages:
- stage: Provision
  displayName: "Provision RBAC Roles"
  jobs:
  - job: ProvisionJob
    steps:
    - checkout: self
    - script: |
        echo "Assigning role: $(roleName) to $(assignee)"
        az role assignment create \
          --assignee $(assignee) \
          --role "$(roleName)" \
          --scope "/subscriptions/$(subscriptionId)/resourceGroups/$(resourceGroup)"
      displayName: "Assign RBAC Roles"

- stage: Cleanup
  displayName: "Revoke RBAC Roles"
  dependsOn: Provision
  jobs:
  - job: CleanupJob
    steps:
    - checkout: self
    - script: |
        echo "Removing role: $(roleName) from $(assignee)"
        az role assignment delete \
          --assignee $(assignee) \
          --role "$(roleName)" \
          --scope "/subscriptions/$(subscriptionId)/resourceGroups/$(resourceGroup)"
      displayName: "Remove RBAC Roles"

